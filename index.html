<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BBVA × VPC — Repayment Analysis</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #1a1a2e; background: #fff; font-size: 14px; line-height: 1.6; }
  .page { max-width: 900px; margin: 0 auto; padding: 48px 40px; }
  .doc-header { border-bottom: 3px solid #6366f1; padding-bottom: 24px; margin-bottom: 36px; }
  .doc-header .tag { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #6366f1; margin-bottom: 8px; }
  .doc-header h1 { font-size: 28px; font-weight: 800; color: #0f0f1a; line-height: 1.2; margin-bottom: 10px; }
  .doc-header .meta { font-size: 12px; color: #6b7280; }
  .doc-header .meta span { margin-right: 20px; }
  h2 { font-size: 17px; font-weight: 700; color: #0f0f1a; margin: 36px 0 12px; padding-bottom: 6px; border-bottom: 1px solid #e5e7eb; }
  h3 { font-size: 14px; font-weight: 700; color: #374151; margin: 20px 0 8px; }
  p { color: #374151; margin-bottom: 10px; }
  .exec-box { background: #f8f9ff; border-left: 4px solid #6366f1; padding: 18px 22px; margin-bottom: 28px; border-radius: 0 6px 6px 0; }
  .exec-box p { margin-bottom: 6px; font-size: 13px; }
  .exec-box p:last-child { margin-bottom: 0; }
  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin: 20px 0; }
  .kpi { background: #f8f9ff; border: 1px solid #e0e1ff; border-radius: 10px; padding: 16px; text-align: center; }
  .kpi .val { font-size: 22px; font-weight: 800; color: #4f46e5; }
  .kpi .lbl { font-size: 10px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 3px; }
  .kpi.orange .val { color: #ea580c; }
  .kpi.green .val { color: #059669; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 12px 0 20px; }
  thead th { background: #f3f4f6; text-align: left; padding: 9px 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: #4b5563; border-bottom: 2px solid #e5e7eb; }
  thead th.r { text-align: right; }
  td { padding: 8px 12px; border-bottom: 1px solid #f3f4f6; color: #374151; }
  td.r { text-align: right; font-variant-numeric: tabular-nums; }
  tr:last-child td { border-bottom: none; }
  tr.total td { background: #f8f9ff; font-weight: 700; border-top: 2px solid #e0e1ff; }
  tr.subtotal td { background: #f9fafb; font-weight: 600; color: #1a1a2e; border-top: 1px solid #d1d5db; border-bottom: 1px solid #d1d5db; }
  tr.highlight td { background: #fef9ec; }
  tr.net-result td { background: #1a1a2e; color: #fff; font-weight: 700; font-size: 14px; }
  tr.section-src td { background: #f0fdf4; color: #166534; font-weight: 700; font-size: 11px; letter-spacing: .5px; padding: 6px 12px; }
  tr.section-use td { background: #fef2f2; color: #991b1b; font-weight: 700; font-size: 11px; letter-spacing: .5px; padding: 6px 12px; }
  .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  .pct-bar-wrap { display: flex; align-items: center; gap: 8px; }
  .pct-bar-bg { flex: 1; height: 6px; border-radius: 3px; background: #e5e7eb; min-width: 60px; }
  .pct-bar-fill { height: 100%; border-radius: 3px; }
  .c-sellers { background: #f59e0b; } .c-prelisting { background: #f97316; }
  .c-listed { background: #6366f1; } .c-sold { background: #10b981; }
  .waterfall { margin: 16px 0 24px; }
  .wf-row { display: flex; align-items: center; margin-bottom: 6px; }
  .wf-label { width: 260px; font-size: 12px; color: #4b5563; flex-shrink: 0; }
  .wf-bar-area { flex: 1; position: relative; height: 28px; }
  .wf-bar { height: 22px; border-radius: 4px; display: flex; align-items: center; padding: 0 8px; font-size: 11px; font-weight: 700; color: #fff; position: absolute; top: 3px; white-space: nowrap; }
  .wf-running { width: 60px; text-align: right; font-size: 12px; font-weight: 700; color: #1a1a2e; padding-left: 10px; flex-shrink: 0; }
  .result-box { border-radius: 8px; padding: 18px 22px; margin: 20px 0; }
  .result-box.shortfall { background: #fef2f2; border: 1px solid #fecaca; }
  .result-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; color: #dc2626; }
  .result-value { font-size: 28px; font-weight: 800; color: #dc2626; }
  .result-sub { font-size: 12px; color: #9ca3af; margin-top: 4px; }
  .bb-box { background: #f0fdf4; border: 1px solid #86efac; border-radius: 10px; padding: 18px 22px; margin: 20px 0; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; align-items: center; }
  .bb-cell { text-align: center; }
  .bb-cell + .bb-cell { border-left: 1px solid #86efac; }
  .bb-cell .lbl { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #166534; font-weight: 700; margin-bottom: 4px; }
  .bb-cell .val { font-size: 26px; font-weight: 800; color: #15803d; }
  .bb-cell .sub { font-size: 11px; color: #4ade80; margin-top: 2px; }
  .assumptions { background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px; padding: 18px 20px; margin: 16px 0 24px; }
  .assumptions h3 { margin-top: 0; color: #92400e; font-size: 13px; }
  .assumptions ul { padding-left: 18px; }
  .assumptions li { font-size: 13px; color: #78350f; margin-bottom: 5px; }
  .assumptions li strong { color: #451a03; }
  .warn-box { background: #fffbeb; border: 1px solid #fde68a; border-radius: 6px; padding: 14px 18px; margin: 16px 0; font-size: 12px; color: #92400e; }
  .warn-box strong { color: #78350f; }
  .elig-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 16px 0 24px; }
  .elig-card { border: 1px solid #e5e7eb; border-radius: 10px; padding: 16px; }
  .elig-card .stage-name { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .elig-row { display: flex; justify-content: space-between; font-size: 12px; padding: 3px 0; border-bottom: 1px solid #f3f4f6; }
  .elig-row:last-child { border-bottom: none; font-weight: 700; }
  .elig-row .label { color: #6b7280; }
  .elig-row .value { font-weight: 600; }
  .green { color: #059669; } .red { color: #dc2626; } .gray-text { color: #9ca3af; }
  .legend { display: flex; gap: 20px; margin: 12px 0 20px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #4b5563; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .footnote { font-size: 11px; color: #9ca3af; font-style: italic; margin-top: -8px; margin-bottom: 16px; }
  .footer { margin-top: 48px; padding-top: 16px; border-top: 1px solid #e5e7eb; font-size: 11px; color: #9ca3af; display: flex; justify-content: space-between; }
  /* ── Sensitivity Panel ─────────────────────────────────────── */
  .sens-panel { background:#f8f9ff; border:1.5px solid #c7d2fe; border-radius:12px; padding:24px; margin:0 0 36px; }
  .sens-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
  .sens-tag { font-size:10px; font-weight:700; letter-spacing:1.4px; text-transform:uppercase; color:#6366f1; margin-bottom:3px; }
  .sens-title { font-size:16px; font-weight:800; color:#0f0f1a; }
  .sens-grid { display:grid; grid-template-columns:1fr 1fr; gap:28px; }
  .s-row { margin-bottom:14px; }
  .s-label { font-size:11px; font-weight:700; color:#4b5563; text-transform:uppercase; letter-spacing:.4px; margin-bottom:5px; }
  .s-control { display:flex; align-items:center; gap:10px; }
  .s-control input[type=range] { flex:1; accent-color:#6366f1; cursor:pointer; }
  .s-val { font-size:13px; font-weight:700; color:#4f46e5; min-width:82px; text-align:right; font-variant-numeric:tabular-nums; }
  .s-hint { font-size:10px; color:#9ca3af; margin-top:2px; }
  .tog-wrap { display:flex; gap:8px; margin-top:4px; }
  .tog-btn { padding:6px 18px; border-radius:6px; font-size:12px; font-weight:700; cursor:pointer; transition:all .12s; }
  .tog-active-yes { background:#6366f1; color:#fff; border:1.5px solid #6366f1; }
  .tog-active-no  { background:#dc2626; color:#fff; border:1.5px solid #dc2626; }
  .tog-inactive   { background:#fff; color:#9ca3af; border:1.5px solid #d1d5db; }
  .reset-btn { background:#6366f1; color:#fff; border:none; border-radius:6px; padding:8px 18px; font-size:12px; font-weight:700; cursor:pointer; }
  .reset-btn:hover { background:#4f46e5; }
  .sc-box { background:#fff; border:1px solid #e5e7eb; border-radius:10px; padding:16px; }
  .sc-section { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; margin:10px 0 4px; }
  .sc-section.src { color:#166534; }
  .sc-section.use { color:#991b1b; }
  .sc-row { display:flex; justify-content:space-between; font-size:12px; padding:3px 0; color:#374151; border-bottom:1px solid #f9fafb; }
  .sc-sub { font-weight:700 !important; border-top:1px solid #e5e7eb !important; border-bottom:2px solid #e5e7eb !important; padding:5px 0 !important; }
  .sc-net { border-radius:8px; padding:12px; margin-top:12px; text-align:center; }
  .sc-net-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; margin-bottom:4px; }
  .sc-net-val { font-size:22px; font-weight:800; }
  .sc-net-sub { font-size:11px; color:#9ca3af; margin-top:3px; }
  @media print {
    body { font-size: 12px; } .page { padding: 24px 28px; }
    .elig-grid, .kpi-row, .bb-box, .sens-panel { break-inside: avoid; }
  }
</style>
</head>

async function decrypt(password) {
  const fromB64 = b => Uint8Array.from(atob(b), c => c.charCodeAt(0));
  const salt = fromB64(PAYLOAD.salt);
  const iv = fromB64(PAYLOAD.iv);
  const ct = fromB64(PAYLOAD.ct);
  const km = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']
  );
  const key = await crypto.subtle.deriveKey(
    { name:'PBKDF2', salt, iterations:100000, hash:'SHA-256' },
    km, { name:'AES-GCM', length:256 }, false, ['decrypt']
  );
  const pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, ct);
  return new TextDecoder().decode(pt);
}

async function unlock() {
  const pwd = document.getElementById('auth-pwd').value;
  const err = document.getElementById('auth-err');
  err.textContent = '';
  try {
    const html = await decrypt(pwd);
    document.querySelector('.auth-wrap').style.display = 'none';
    const mount = document.getElementById('content-mount');
    mount.innerHTML = html;
    mount.style.display = 'block';
    // Re-execute inline scripts (innerHTML doesn't run them)
    mount.querySelectorAll('script').forEach(old => {
      const s = document.createElement('script');
      if (old.src) s.src = old.src;
      else s.textContent = old.textContent;
      old.parentNode.replaceChild(s, old);
    });
    // DOMContentLoaded already fired before decryption, so the inner DOMContentLoaded
    // listener never runs. Trigger the scorecard render manually.
    if (typeof updatePanel === 'function') {
      updatePanel();
    }
  } catch (e) {
    err.textContent = 'Incorrect password.';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('auth-pwd').addEventListener('keydown', e => {
    if (e.key === 'Enter') unlock();
  });
});
